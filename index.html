<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WDPORT | Creative Portfolio</title>
        <meta name="description" data-i18n-content="meta-desc" content="" />
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Syncopate:wght@700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <div class="cursor"></div>
        <div class="cursor-follower"></div>

        <canvas id="webgl"></canvas>

        <nav class="glass-panel">
            <div class="logo">WDPORT</div>
            <ul class="nav-links">
                <li><a href="#home" data-i18n="nav-home">Home</a></li>
                <li><a href="#about" data-i18n="nav-about">About</a></li>
                <li><a href="#works" data-i18n="nav-works">Works</a></li>
                <li><a href="#contact" data-i18n="nav-contact">Contact</a></li>
                <li class="lang-switcher-container">
                    <div class="lang-switcher">
                        <button class="lang-btn active" data-lang="id">
                            ID
                        </button>
                        <button class="lang-btn" data-lang="en">EN</button>
                        <button class="lang-btn" data-lang="zh">中</button>
                    </div>
                </li>
            </ul>
            <div class="hamburger">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </nav>

        <main>
            <section id="home" class="hero">
                <div class="hero-content">
                    <h1 class="glitch" data-i18n="hero-text1" data-text=""></h1>
                    <h1 class="glitch" data-i18n="hero-text2" data-text=""></h1>
                    <p data-i18n="hero-desc"></p>
                    <a href="#works" class="cta-btn" data-i18n="hero-cta"></a>
                </div>
                <div class="scroll-indicator">
                    <span data-i18n="scroll-down"></span>
                    <div class="line"></div>
                </div>
            </section>

            <section id="about" class="about">
                <div class="container about-split">
                    <div class="about-left">
                        <h2 class="section-title" data-i18n="about-title"></h2>
                        <div class="about-text">
                            <p class="reveal-text" data-i18n="about-desc"></p>
                        </div>
                    </div>
                    <div class="about-right">
                        <h2 class="section-title" data-i18n="exp-title">
                            EXPERIENCE
                        </h2>
                        <div class="experience-list">
                            <div
                                class="experience-item glass-panel"
                                style="padding: 1.5rem; cursor: pointer"
                                data-i18n-title="exp1-role"
                                data-i18n-subtitle="exp1-company"
                                data-i18n-desc="exp1-desc"
                            >
                                <span class="year" data-i18n="exp1-year"></span>
                                <h3 data-i18n="exp1-role"></h3>
                                <p data-i18n="exp1-company"></p>
                            </div>
                            <div
                                class="experience-item glass-panel"
                                style="padding: 1.5rem; cursor: pointer"
                                data-i18n-title="exp2-role"
                                data-i18n-subtitle="exp2-company"
                                data-i18n-desc="exp2-desc"
                            >
                                <span class="year" data-i18n="exp2-year"></span>
                                <h3 data-i18n="exp2-role"></h3>
                                <p data-i18n="exp2-company"></p>
                            </div>
                            <div
                                class="experience-item glass-panel"
                                style="padding: 1.5rem; cursor: pointer"
                                data-i18n-title="exp3-role"
                                data-i18n-subtitle="exp3-company"
                                data-i18n-desc="exp3-desc"
                            >
                                <span class="year" data-i18n="exp3-year"></span>
                                <h3 data-i18n="exp3-role"></h3>
                                <p data-i18n="exp3-company"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="works" class="works">
                <div class="container">
                    <h2 class="section-title" data-i18n="works-title">
                        SELECTED WORKS
                    </h2>
                    <div class="projects-grid">
                        <!-- Projects will be loaded dynamically from GitHub -->
                        <p
                            style="
                                grid-column: 1/-1;
                                text-align: center;
                                opacity: 0.5;
                            "
                            data-i18n="loading-projects"
                        ></p>
                    </div>
                </div>
            </section>

            <section id="contact" class="contact">
                <div
                    class="container glass-panel"
                    style="
                        padding: 4rem 2rem;
                        border-radius: 24px;
                        text-align: center;
                    "
                >
                    <h3
                        class="section-title"
                        style="margin-bottom: 1rem"
                        data-i18n="contact-title"
                    ></h3>
                    <a href="mailto:w@widifirmaan.web.id" class="email-link"
                        >w@widifirmaan.web.id</a
                    >
                    <footer>
                        <p data-i18n="footer-copy"></p>
                    </footer>
                </div>
            </section>
        </main>

        <!-- Modal Structure -->
        <div id="detail-modal" class="modal">
            <div class="modal-overlay"></div>
            <div class="modal-content glass-panel" data-lenis-prevent>
                <button class="modal-close">&times;</button>
                <div class="modal-scroll-area">
                    <div class="modal-body">
                        <div
                            id="modal-description"
                            class="modal-description"
                        ></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Three.js, GSAP, & Lenis -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
        <!-- Custom Script & Translation -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="translations.js"></script>
        <script src="script.js"></script>
    </body>
</html>
